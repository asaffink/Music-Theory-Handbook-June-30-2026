<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chord staff design options</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #111827;
      color: #e2e8f0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .intro {
      margin: 0 0 24px;
      color: #94a3b8;
      max-width: 52rem;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .option-card {
      background: #000;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 14px;
    }

    .option-card h2 {
      margin: 0 0 4px;
      font-size: 1.1rem;
      color: #f8fafc;
    }

    .option-card p {
      margin: 0 0 12px;
      font-size: 0.88rem;
      color: #94a3b8;
      line-height: 1.4;
    }

    .sample-row {
      margin-bottom: 10px;
    }

    .sample-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 4px;
    }

    .sample-mount {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }

    .sample-mount svg {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Chord staff design options</h1>
  <p class="intro">
    Compare four staff styles side by side. The main handbook now uses
    <strong>Option A — Black frame, white paper</strong>. Open this page in a
    separate tab to choose what you prefer.
  </p>

  <div class="grid" id="grid"></div>

  <script src="handbook-chords.js"></script>
  <script>
    const THEME_META = {
      blackWhite: {
        title: "Option A — Black frame, white paper",
        blurb: "Pure black panel, white staff card sized to fit notes, ledgers, clef, and accidentals. Black ink throughout."
      },
      softPaper: {
        title: "Option B — Soft paper",
        blurb: "Warm off-white paper (#fffef8) on black. Slightly softer lines; same layout as A."
      },
      highContrast: {
        title: "Option C — High contrast",
        blurb: "Pure white paper, pure black lines and notes. Maximum contrast for small screens."
      },
      warmFrame: {
        title: "Option D — Warm cream",
        blurb: "Cream paper with brown ink on black frame. Gentler, book-like look."
      }
    };

    const SAMPLES = [
      { label: "C major", args: ["C", 0, false, "major", null] },
      { label: "C♯ maj7", args: ["C#", 1, false, "major", "Maj7"] },
      { label: "G♭ sus4", args: ["Gb", 6, true, "sus4", null] },
      { label: "F♯°7 (dim7)", args: ["F#", 6, false, "diminished", "dim7"] }
    ];

    const grid = document.getElementById("grid");
    const { themes, buildChordStaffSvg, buildDemoChord } = window.ChordsStaffPreview;

    Object.keys(THEME_META).forEach((themeId) => {
      const meta = THEME_META[themeId];
      const card = document.createElement("article");
      card.className = "option-card";

      const h2 = document.createElement("h2");
      h2.textContent = meta.title;
      card.appendChild(h2);

      const blurb = document.createElement("p");
      blurb.textContent = meta.blurb;
      card.appendChild(blurb);

      SAMPLES.forEach((sample) => {
        const row = document.createElement("div");
        row.className = "sample-row";

        const lab = document.createElement("div");
        lab.className = "sample-label";
        lab.textContent = sample.label;
        row.appendChild(lab);

        const mount = document.createElement("div");
        mount.className = "sample-mount";
        const voicing = buildDemoChord(...sample.args);
        const svg = buildChordStaffSvg(
          voicing.names,
          voicing.midis,
          voicing.notationOctaves,
          themeId
        );
        mount.appendChild(svg);
        row.appendChild(mount);
        card.appendChild(row);
      });

      grid.appendChild(card);
    });
  </script>
</body>
</html>
